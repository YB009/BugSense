services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: bugsense-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: bugsense
      CLICKHOUSE_USER: bugsense
      CLICKHOUSE_PASSWORD: bugsense
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--host",
          "127.0.0.1",
          "--user",
          "bugsense",
          "--password",
          "bugsense",
          "--query",
          "SELECT 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  clickhouse_data:

